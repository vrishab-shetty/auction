spring:
  application:
    name: auction
  datasource:
    url: jdbc:postgresql://localhost:5432/auction
    driver-class-name: org.postgresql.Driver
    username: auction_user
    password: USER@AUCT1ON
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: localhost
    port: 6379

api:
  endpoint:
    base-url: /api/v1

server:
  port: 8080

logging:
  level:
    org:
      springframework:
        security: INFO
